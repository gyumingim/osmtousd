<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>구미 교차로 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; font-family:sans-serif; }
  #map { height:100vh; }
  #panel { position:absolute; top:12px; right:12px; z-index:1000;
           background:#1e293b; color:#e2e8f0; padding:12px 16px;
           border-radius:8px; font-size:13px; box-shadow:0 2px 8px rgba(0,0,0,.4); }
  #panel h2 { margin:0 0 8px; font-size:15px; }
  .legend span { display:inline-block; width:10px; height:10px;
                 border-radius:50%; margin-right:5px; }
  a { color:#34d399; }
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <h2>구미 1산단 교차로 지도</h2>
  <div id="stats">로딩…</div>
  <div class="legend" style="margin-top:8px">
    <div><span style="background:#ef4444"></span>교차로</div>
    <div><span style="background:#f59e0b"></span>입체/회전/연결</div>
    <div><span style="background:#3b82f6"></span>신호등</div>
  </div>
  <div style="margin-top:8px"><a href="/">← 데이터셋 카탈로그</a></div>
</div>
<script>
const TYPE_COLOR = { "102":"#ef4444", "103":"#f59e0b", "104":"#f59e0b",
                     "106":"#f59e0b", "107":"#f59e0b" };
const map = L.map("map").setView([36.115, 128.36], 13);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  { attribution:"© OpenStreetMap", maxZoom:19 }).addTo(map);

async function load() {
  const [ix, sg] = await Promise.all([
    fetch("/api/intersections").then(r=>r.json()),
    fetch("/api/traffic_signals").then(r=>r.json()),
  ]);
  const byType = {};
  ix.intersections.forEach(n => {
    byType[n.type_name] = (byType[n.type_name]||0)+1;
    L.circleMarker([n.lat, n.lon], {
      radius:5, color:TYPE_COLOR[n.type]||"#f59e0b",
      fillOpacity:0.8, weight:1
    }).bindPopup(`<b>${n.type_name}</b><br>${n.name||n.id}`).addTo(map);
  });
  sg.signals.forEach(s => {
    L.circleMarker([s.lat, s.lon], {
      radius:4, color:"#3b82f6", fillOpacity:0.9, weight:1
    }).bindPopup("신호등 "+s.id).addTo(map);
  });
  document.getElementById("stats").innerHTML =
    `교차로/특수노드 <b>${ix.count}</b>개 · 신호등 <b>${sg.count}</b>개<br>` +
    Object.entries(byType).map(([k,v])=>`${k}: ${v}`).join(" · ");
}
load();
</script>
</body>
</html>
