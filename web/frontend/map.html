<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>구미 교차로 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; font-family:sans-serif; }
  #map { height:100vh; }
  #panel { position:absolute; top:12px; right:12px; z-index:1000;
           background:#1e293b; color:#e2e8f0; padding:12px 16px;
           border-radius:8px; font-size:13px; box-shadow:0 2px 8px rgba(0,0,0,.4); }
  #panel h2 { margin:0 0 8px; font-size:15px; }
  .legend span { display:inline-block; width:10px; height:10px;
                 border-radius:50%; margin-right:5px; }
  a { color:#34d399; }
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <h2>구미 1산단 교차로 지도</h2>
  <div id="stats">로딩…</div>
  <div style="margin-top:10px">
    <button id="btn-node" onclick="setMode('node')"
      style="background:#334155;color:#e2e8f0;border:none;border-radius:4px;padding:4px 8px;cursor:pointer">노드유형</button>
    <button id="btn-heat" onclick="setMode('heat')"
      style="background:#334155;color:#e2e8f0;border:none;border-radius:4px;padding:4px 8px;cursor:pointer">노드혼잡</button>
    <button id="btn-road" onclick="setMode('road')"
      style="background:#334155;color:#e2e8f0;border:none;border-radius:4px;padding:4px 8px;cursor:pointer">도로혼잡</button>
    <select id="hour" onchange="if(MODE!='node')setMode(MODE)"
      style="background:#0f172a;color:#e2e8f0;border:1px solid #475569;border-radius:4px;padding:3px">
    </select>
  </div>
  <div class="legend" style="margin-top:8px" id="legend"></div>
  <div style="margin-top:8px"><a href="/">← 데이터셋 카탈로그</a></div>
</div>
<script>
const TYPE_COLOR = { "102":"#ef4444", "103":"#f59e0b", "104":"#f59e0b",
                     "106":"#f59e0b", "107":"#f59e0b" };
const map = L.map("map").setView([36.115, 128.36], 13);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  { attribution:"© OpenStreetMap", maxZoom:19 }).addTo(map);
let MODE = "node", LAYER = L.layerGroup().addTo(map);

// ── 시뮬레이션 수집지점 마커 (구미 1산단 디지털트윈) — 모드 무관 상시 표시 ──
const SIM_CENTER = [36.102064, 128.376468];
const simIcon = L.divIcon({
  className: "sim-pin", iconSize: [34, 34], iconAnchor: [17, 17],
  html: `<div style="width:34px;height:34px;border-radius:50%;background:#10b981;
    border:3px solid #fff;display:flex;align-items:center;justify-content:center;
    font-size:17px;box-shadow:0 0 0 5px rgba(16,185,129,.35);cursor:pointer">🎥</div>`
});
const simMarker = L.marker(SIM_CENTER, { icon: simIcon, zIndexOffset: 2000 })
  .addTo(map)
  .bindTooltip("🎥 시뮬 수집지점 (클릭)", { direction: "top", offset: [0, -18] })
  .bindPopup("불러오는 중…", { maxWidth: 360, minWidth: 330 });
let simHtml = null;
simMarker.on("click", async () => {
  if (!simHtml) {
    const d = await fetch("/api/datasets").then(r => r.json());
    const rows = d.datasets.map(ds => `
      <a href="/?open=${ds.id}" target="_blank" style="display:flex;gap:8px;
         align-items:center;padding:5px;border-bottom:1px solid #eee;
         text-decoration:none;color:#0f172a">
        <img src="/api/datasets/${ds.id}/preview?frame=0&view=cinematic"
             style="width:84px;height:47px;object-fit:cover;border-radius:3px;
             background:#222" loading="lazy"/>
        <div style="line-height:1.3"><b style="font-size:12px">${ds.scenario_name
          || ds.scenario}</b><br><span style="font-size:11px;color:#555">${ds.variant}
          · ${ds.frame_count}프레임</span></div></a>`).join("");
    simHtml = `<div style="width:330px">
      <div style="font-weight:700;font-size:13px;margin-bottom:3px">🎥 구미 1산단
        디지털트윈 — 합성데이터 수집지점</div>
      <div style="font-size:11px;color:#555;margin-bottom:6px">위도 36.10206°N ·
        경도 128.37647°E · 공단동/광평동<br>이 지점에서 수집한 데이터셋
        <b>${d.count}개</b> (클릭 → 재생):</div>
      <div style="max-height:280px;overflow:auto">${rows}</div></div>`;
  }
  simMarker.setPopupContent(simHtml);
});

// 시간 셀렉터 채우기
const hs = document.getElementById("hour");
for (let h=0; h<24; h++) hs.innerHTML += `<option value="${h}" ${h==8?"selected":""}>${h}시</option>`;

function congColor(c){ // 0(초록)~1(빨강)
  const r = Math.round(255*Math.min(1,c*2)), g = Math.round(255*Math.min(1,(1-c)*2));
  return `rgb(${r},${g},80)`;
}

async function setMode(m){
  MODE = m; LAYER.clearLayers();
  document.getElementById("btn-node").style.outline = m=="node"?"2px solid #34d399":"none";
  document.getElementById("btn-heat").style.outline = m=="heat"?"2px solid #34d399":"none";
  document.getElementById("btn-road").style.outline = m=="road"?"2px solid #34d399":"none";
  if (m=="road") {
    const hour = document.getElementById("hour").value;
    const d = await fetch(`/api/links/congestion?hour=${hour}`).then(r=>r.json());
    d.links.forEach(lk=>{
      const col = lk.outlier ? "#ffffff" : congColor(lk.congestion);
      lk.parts.forEach(pts=>L.polyline(pts,{
        color: col, weight: lk.outlier?5:2+lk.congestion*4, opacity:0.85
      }).bindPopup(`<b>${lk.name||"도로"}</b><br>교통량 ${lk.volume_15min}/15분<br>혼잡 ${(lk.congestion*100).toFixed(0)}% · Z=${lk.zscore} ${lk.outlier?"⚠️이상치":""}`).addTo(LAYER));
    });
    const out = d.links.filter(l=>l.outlier).length;
    document.getElementById("stats").innerHTML=`${hour}시 도로혼잡 · 링크 <b>${d.count}</b>개 · <b style="color:#fca5a5">이상치 ${out}개</b>`;
    document.getElementById("legend").innerHTML=
      `<div><span style="background:rgb(80,255,80);border-radius:0;width:16px;height:4px"></span> 원활</div>
       <div><span style="background:rgb(255,200,80);border-radius:0;width:16px;height:4px"></span> 보통</div>
       <div><span style="background:rgb(255,40,80);border-radius:0;width:16px;height:4px"></span> 혼잡(굵게)</div>
       <div><span style="background:#fff;border-radius:0;width:16px;height:4px"></span> Z-score 이상치</div>`;
    return;
  }
  if (m=="node") {
    const [ix, sg] = await Promise.all([
      fetch("/api/intersections").then(r=>r.json()),
      fetch("/api/traffic_signals").then(r=>r.json()),
    ]);
    const byType={};
    ix.intersections.forEach(n=>{
      byType[n.type_name]=(byType[n.type_name]||0)+1;
      L.circleMarker([n.lat,n.lon],{radius:5,color:TYPE_COLOR[n.type]||"#f59e0b",fillOpacity:0.8,weight:1})
        .bindPopup(`<b>${n.type_name}</b><br>${n.name||n.id}`).addTo(LAYER);
    });
    sg.signals.forEach(s=>L.circleMarker([s.lat,s.lon],{radius:4,color:"#3b82f6",fillOpacity:0.9,weight:1})
      .bindPopup("신호등 "+s.id).addTo(LAYER));
    document.getElementById("stats").innerHTML=`교차로/특수노드 <b>${ix.count}</b>개 · 신호등 <b>${sg.count}</b>개`;
    document.getElementById("legend").innerHTML=
      `<div><span style="background:#ef4444"></span>교차로</div>
       <div><span style="background:#f59e0b"></span>입체/회전/연결</div>
       <div><span style="background:#3b82f6"></span>신호등</div>`;
  } else {
    const hour = document.getElementById("hour").value;
    const d = await fetch(`/api/intersections/heatmap?hour=${hour}`).then(r=>r.json());
    d.nodes.forEach(n=>{
      L.circleMarker([n.lat,n.lon],{
        radius: n.outlier?10:6, color: n.outlier?"#ffffff":congColor(n.congestion),
        weight: n.outlier?2:1, fillColor:congColor(n.congestion), fillOpacity:0.85
      }).bindPopup(`<b>${n.name||n.id}</b><br>교통량 ${n.volume_15min}/15분<br>Z=${n.zscore} ${n.outlier?"⚠️이상치":""}`).addTo(LAYER);
    });
    const out = d.nodes.filter(n=>n.outlier).length;
    document.getElementById("stats").innerHTML=`${hour}시 혼잡도 · 평균 ${d.mean}/15분 · <b style="color:#fca5a5">이상치 ${out}개</b>`;
    document.getElementById("legend").innerHTML=
      `<div><span style="background:rgb(80,255,80)"></span>원활</div>
       <div><span style="background:rgb(255,200,80)"></span>보통</div>
       <div><span style="background:rgb(255,40,80)"></span>혼잡</div>
       <div><span style="background:#fff;border:1px solid #999"></span>Z-score 이상치</div>`;
  }
}
setMode("node");
</script>
</body>
</html>
